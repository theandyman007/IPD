# Install Docker Engine on all cluster nodes.
# 
# Purpose: required for support of NVIDIA Toolkit.
# Usage: ansible-playbook -K -i ansible/inventory.ini ansible/install_docker.yml
# Ref: https://docs.docker.com/engine/install/ubuntu/

---
- name: Install Docker Engine
  hosts: all
  become: true

  tasks:
    - name: Remove conflicting packages
      apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - docker-compose-v2
          - podman-docker
          - containerd
          - runc
        state: absent
      ignore_errors: true

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      shell: >
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg
        -o /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Set permissions on Docker GPG key
      file:
        path: /etc/apt/keyrings/docker.asc
        mode: 'a+r'

    - name: Add Docker repository
      shell: >
        echo "deb [arch=$(dpkg --print-architecture)
        signed-by=/etc/apt/keyrings/docker.asc]
        https://download.docker.com/linux/ubuntu
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable"
        | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: true