# NVIDIA Toolkit is required for use of Ollama Docker Containers.
# 
# Purpose:  Installs NVIDIA Container Toolkit on all cluster nodes
# Usage:    ansible-playbook -K -i ansible/inventory.ini ansible/install_nvidia_toolkit.yml
#
# Refs: 
# - https://hub.docker.com/r/ollama/ollama
# - https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html

---
- name: Install NVIDIA Container Toolkit
  hosts: all
  become: true

  tasks:
    # 1. Install the prerequsities for Ubunti, Debian.
    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg2
        state: present
        update_cache: true

    # 2. Configure the production repository.
    - name: Add NVIDIA GPG key
      shell: >
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey
        | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: Add NVIDIA Container Toolkit repository
      shell: >
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list
        | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g'
        | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    # Optional: Enable experimental packages (disabled by default)
    - name: Enable experimental packages (optional)
      shell: >
        sed -i -e '/experimental/ s/^#//g'
        /etc/apt/sources.list.d/nvidia-container-toolkit.list
      when: false

    # 3. Update the packages list from the repository.
    - name: Update apt cache
      apt:
        update_cache: true

    # 4. Install the NVIDIA Container Toolkit packages.
    - name: Install NVIDIA Container Toolkit
      apt:
        name: nvidia-container-toolkit
        state: present


    # Configure NVIDIA Container Toolkit for Docker
    # Ref: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html#configuration
    
    # 1. Configure the container runtime by using the nvidia-ctk command.
    - name: Configure NVIDIA runtime for Docker
      shell: nvidia-ctk runtime configure --runtime=docker

    # 2. Restart the Docker daemon.
    - name: Restart Docker service
      systemd:
        name: docker
        state: restarted
      ignore_errors: true

    # 3. Configure the container runtime by using the nvidia-ctk command.
    - name: Configure NVIDIA runtime for containerd
      shell: nvidia-ctk runtime configure --runtime=containerd
      ignore_errors: true

    # 4. Restart containerd.
    - name: Restart containerd service
      systemd:
        name: containerd
        state: restarted
      ignore_errors: true