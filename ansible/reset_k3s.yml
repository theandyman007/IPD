# Reset FORGE K3s Cluster
#
# Purpose:  Cleanly uninstall K3s from all nodes for a fresh start
# Usage:    ansible-playbook -K -i ansible/inventory.ini ansible/reset_k3s.yml
#
# WARNING:  This will destroy all running pods, services, and K3s configuration
# NOTE: This is the NUCLEAR option. If the setup goes badly or things are just not
#     responding correctly, then step back, reset, and rerun main.yml :-)
#
# SECOND WARNING: don't forget to regenerate your gchr-secrets

---
- name: Uninstall K3s agents
  hosts: all:!platinum
  become: true

  tasks:
    - name: Uninstall K3s agent
      shell: /usr/local/bin/k3s-agent-uninstall.sh
      ignore_errors: true

    - name: Clean up leftover K3s files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/k3s
        - /usr/local/bin/kubectl
        - /usr/local/bin/crictl
        - /usr/local/bin/ctr
        - /var/lib/rancher
        - /etc/rancher

    - name: Remove broken containerd template
      file:
        path: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
        state: absent
      ignore_errors: true

- name: Uninstall K3s server
  hosts: platinum
  become: true

  tasks:
    - name: Uninstall K3s server
      shell: /usr/local/bin/k3s-uninstall.sh
      ignore_errors: true

    - name: Clean up leftover K3s files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/k3s
        - /usr/local/bin/kubectl
        - /usr/local/bin/crictl
        - /usr/local/bin/ctr
        - /var/lib/rancher
        - /etc/rancher